<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- ears -->
  <polygon points="12,28 4,4 24,18" fill="#111"/>
  <polygon points="52,28 60,4 40,18" fill="#111"/>
  <!-- inner ears -->
  <polygon points="14,26 8,10 22,19" fill="#e8a0a0"/>
  <polygon points="50,26 56,10 42,19" fill="#e8a0a0"/>
  <!-- head -->
  <circle cx="32" cy="36" r="20" fill="#111"/>
  <!-- eyes -->
  <ellipse cx="23" cy="32" rx="4.5" ry="5" fill="#f5d742"/>
  <ellipse cx="41" cy="32" rx="4.5" ry="5" fill="#f5d742"/>
  <!-- pupils -->
  <ellipse cx="23" cy="32" rx="2" ry="4.5" fill="#111"/>
  <ellipse cx="41" cy="32" rx="2" ry="4.5" fill="#111"/>
  <!-- nose -->
  <polygon points="32,40 30,43 34,43" fill="#e8a0a0"/>
  <!-- mouth -->
  <path d="M28 44 Q32 48 36 44" fill="none" stroke="#555" stroke-width="1.2" stroke-linecap="round"/>
  <!-- whiskers -->
  <line x1="6" y1="38" x2="20" y2="40" stroke="#555" stroke-width="1.2"/>
  <line x1="6" y1="42" x2="20" y2="42" stroke="#555" stroke-width="1.2"/>
  <line x1="58" y1="38" x2="44" y2="40" stroke="#555" stroke-width="1.2"/>
  <line x1="58" y1="42" x2="44" y2="42" stroke="#555" stroke-width="1.2"/>
</svg>
